<div class="github-timeline" id="github-timeline-{{ .Get "id" }}">
  <div class="timeline-loading">
    <span class="loading-spinner"></span>
    正在加载 GitHub 项目数据...
  </div>
  <div class="timeline-container" style="display: none;"></div>
</div>

<script>
(function() {
  const projects = [
  
    { owner: 'wgpsec', repo: 'redc', description: '下一代基础设施管理工具' },
    { owner: 'ffffffff0x', repo: 'f8x', description: 'Red/Blue team environment automation deployment tool' },
    { owner: 'ffffffff0x', repo: '1earn', description: '安全知识框架' },
    { owner: 'ffffffff0x', repo: 'burp_nu_te_gen', description: 'nuclei模版生成插件' },
    { owner: 'ffffffff0x', repo: 'Pentest101', description: '渗透测试Tips' },
    { owner: 'ffffffff0x', repo: 'AboutSecurity', description: '渗透测试payload和bypass字典' },
    { owner: 'ffffffff0x', repo: 'gendict', description: '字典生成工具' },
    { owner: 'ffffffff0x', repo: 'ones', description: '网络资产测绘引擎API查询工具' },
    { owner: 'ffffffff0x', repo: 'pathtrim', description: '过滤path路径' },
    { owner: 'ffffffff0x', repo: 'iprange', description: '计算ip范围' },
    { owner: 'ffffffff0x', repo: 'JVWA', description: 'java代码审计学习靶场' },
    { owner: 'ffffffff0x', repo: 'name-fuzz', description: '目标已知信息字典生成工具' },
    { owner: 'ffffffff0x', repo: 'Digital-Privacy', description: '数字隐私保护与osint信息收集' },
    { owner: 'No-Github', repo: 'postgresql_udf_help', description: 'PostgreSQL提权辅助脚本' },
    { owner: 'No-Github', repo: 'xiasqlpro', description: 'xiaSql魔改版' },
    { owner: 'ffffffff0x', repo: '403-fuzz', description: '针对403页面的fuzz脚本' }
  ];

  const container = document.querySelector('#github-timeline-{{ .Get "id" }} .timeline-container');
  const loading = document.querySelector('#github-timeline-{{ .Get "id" }} .timeline-loading');

  function parseStars(value) {
    if (!value) return '0';
    if (typeof value === 'number') return value;
    if (value.includes('k')) {
      return Math.round(parseFloat(value) * 1000);
    }
    return parseInt(value) || 0;
  }

  async function fetchProjectData(project) {
    try {
      const [starsRes, infoRes] = await Promise.all([
        fetch(`https://img.shields.io/github/stars/${project.owner}/${project.repo}.json`),
        fetch(`https://api.github.com/repos/${project.owner}/${project.repo}`)
      ]);
      const starsData = await starsRes.json();
      const infoData = await infoRes.json();
      return {
        ...project,
        stars: parseStars(starsData.value),
        starsDisplay: starsData.message || '0',
        created_at: infoData.created_at || '1970-01-01'
      };
    } catch (e) {
      return { ...project, stars: 0, starsDisplay: '0', created_at: '1970-01-01' };
    }
  }

  Promise.all(projects.map(fetchProjectData))
  .then(results => {
    results.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    
    let html = '<div class="timeline">';
    results.forEach((project, index) => {
      html += `
        <div class="timeline-item">
          <div class="timeline-marker"></div>
          <div class="timeline-content">
            <a href="https://github.com/${project.owner}/${project.repo}" target="_blank" class="project-title">
              <img src="https://img.shields.io/github/stars/${project.owner}/${project.repo}?style=flat" alt="stars" />
            </a>
            <span class="project-name">${project.repo}</span>
            <span class="project-desc">${project.description}</span>
            <span class="project-date">${new Date(project.created_at).toLocaleDateString('zh-CN', { year: 'numeric', month: 'short' })}</span>
          </div>
        </div>
      `;
    });
    html += '</div>';
    
    container.innerHTML = html;
    loading.style.display = 'none';
    container.style.display = 'block';
  }).catch(err => {
    loading.innerHTML = '加载失败，请刷新页面重试';
  });
})();
</script>

<style>
.github-timeline {
  margin: 20px 0;
}
.timeline-loading {
  text-align: center;
  padding: 20px;
  color: #999;
}
.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ddd;
  border-top-color: #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.timeline {
  position: relative;
  padding-left: 20px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 4px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #e0e0e0;
}
.timeline-item {
  position: relative;
  padding-bottom: 20px;
  padding-left: 20px;
}
.timeline-marker {
  position: absolute;
  left: -18px;
  top: 4px;
  width: 10px;
  height: 10px;
  background: #fff;
  border: 2px solid #4a4a4a;
  border-radius: 50%;
  z-index: 1;
}
.timeline-content {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}
.project-title {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: #e44d26;
  font-weight: 600;
  text-decoration: none;
}
.project-title:hover {
  text-decoration: underline;
}
.project-name {
  font-weight: 600;
  color: #333;
}
.project-desc {
  color: #666;
  font-size: 14px;
}
.project-date {
  color: #999;
  font-size: 12px;
}
</style>
